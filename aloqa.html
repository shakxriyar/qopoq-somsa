<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aloqa | SHOKH BURGER</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
    <style>
        :root {
            /* To'q Ko'k Dizayn */
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #0047AB; 
            --accent-glow: #00008B;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --btn-gradient: linear-gradient(90deg, #00008B, #0047AB);
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        /* NAVBAR */
        .navbar { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 5%; 
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); 
            z-index: 2000; 
            box-sizing: border-box; 
        }
        .logo { 
            font-weight: 900; 
            font-size: 1.5rem; 
            color: var(--accent); 
            text-decoration: none; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
        .nav-link { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: bold; 
            padding: 8px 20px; 
            border-radius: 20px; 
            background: var(--glass); 
            border: 1px solid var(--border); 
            transition: 0.3s; 
            font-size: 14px;
        }
        .nav-link:hover { 
            border-color: var(--accent); 
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow); 
        }

        /* CONTACT CONTAINER */
        .contact-container { 
            flex: 1; 
            padding: 120px 20px 50px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .contact-card { 
            background: #111111; 
            border: 2px solid var(--border); 
            padding: 40px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: 0.4s;
        }
        .contact-card:hover {
            border-color: var(--accent);
            box-shadow: 0 10px 50px rgba(0, 71, 171, 0.2);
        }
        
        .contact-card h1 { 
            color: white; 
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow); 
            margin-bottom: 35px; 
            font-size: 2rem;
            letter-spacing: 1px;
        }
        
        .info-item { 
            margin-bottom: 25px; 
            font-size: 1.1rem; 
            line-height: 1.6;
        }
        .info-item b { 
            color: var(--accent); 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        
        /* SOCIAL BUTTONS */
        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 35px; 
            flex-wrap: wrap;
        }
        .social-btn { 
            text-decoration: none; 
            color: white; 
            background: var(--btn-gradient); 
            padding: 12px 30px; 
            border-radius: 12px; 
            font-weight: bold; 
            transition: 0.3s;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        .social-btn:hover { 
            transform: translateY(-3px); 
            filter: brightness(1.2);
            box-shadow: 0 5px 20px rgba(0, 71, 171, 0.4); 
        }
        
        .insta {
            background: linear-gradient(45deg, #00008B, #0047AB, #0056b3);
        }

        @media (max-width: 600px) {
            .contact-card { padding: 30px 20px; }
            .contact-card h1 { font-size: 1.6rem; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="logo">SHOKH BURGER</a>
    <a href="index.html" class="nav-link">🏠 Bosh sahifa</a>
</nav>

<div class="contact-container">
    <div class="contact-card">
        <h1>Biz bilan aloqa</h1>
        
        <div class="info-item">
            <b>📍 Manzilimiz</b>
            Toshkent shahri, Chilonzor tumani, Cukur ko'chasi 1-uy.
        </div>

        <div class="info-item">
            <b>📞 Telefon</b>
            +998 77 577 20 42
        </div>

        <div class="info-item">
            <b>⏰ Ish vaqti</b>
            Har kuni: 10:00 - 23:00
        </div>

        <div class="social-links">
            <a href="https://t.me/shakhriyarr" target="_blank" class="social-btn">Telegram</a>
            <a href="https://instagram.com" target="_blank" class="social-btn insta">Instagram</a>
        </div>
    </div>
</div>

<footer style="padding: 30px; text-align: center; opacity: 0.4; font-size: 12px;">
    © 2026 SHOKH BURGER Premium.
</footer>

</body>
</html>
